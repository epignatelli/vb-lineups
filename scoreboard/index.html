<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Scoreboard</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#111111"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header id="topbar">
    <div id="set-history"></div>
    <div id="set-label">Set 1 of 5</div>
    <div id="target-label">First to 25</div>
  </header>

  <main id="court">
    <div class="panel" id="panel-a" onclick="score('a')">
      <div class="team-header">
        <span class="serve-dot" id="serve-a" onclick="setServe(event,'a')"></span>
        <span class="team-name" id="name-a" onclick="editName(event,'a')">Team A</span>
        <div class="sets-dots" id="sets-a"></div>
      </div>
      <div class="score" id="score-a">0</div>
      <button class="minus-btn" onclick="unscore(event,'a')">−</button>
    </div>

    <div class="divider" id="divider"></div>

    <div class="panel" id="panel-b" onclick="score('b')">
      <div class="team-header">
        <span class="serve-dot" id="serve-b" onclick="setServe(event,'b')"></span>
        <span class="team-name" id="name-b" onclick="editName(event,'b')">Team B</span>
        <div class="sets-dots" id="sets-b"></div>
      </div>
      <div class="score" id="score-b">0</div>
      <button class="minus-btn" onclick="unscore(event,'b')">−</button>
    </div>
  </main>

  <footer id="footbar">
    <a href="../tools/" class="foot-btn foot-back">←</a>
    <button class="foot-btn foot-settings" onclick="openSettings()">···</button>
    <button class="foot-btn foot-new" onclick="confirmNewMatch()">New</button>
  </footer>

  <!-- Settings overlay -->
  <div id="settings-overlay" class="overlay hidden" onclick="closeSettings(event)">
    <div class="settings-card" onclick="event.stopPropagation()">
      <div class="overlay-eyebrow">Settings</div>

      <div class="setting-group">
        <div class="setting-group-label">Format</div>
        <div class="setting-opts">
          <button class="setting-opt" id="opt-bo3" onclick="setBestOf(3)">Bo3</button>
          <button class="setting-opt" id="opt-bo5" onclick="setBestOf(5)">Bo5</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-group-label">Set points</div>
        <div class="setting-opts">
          <button class="setting-opt" id="opt-25" onclick="setSetPoints(25)">25</button>
          <button class="setting-opt" id="opt-21" onclick="setSetPoints(21)">21</button>
          <button class="setting-opt" id="opt-18" onclick="setSetPoints(18)">18</button>
          <button class="setting-opt" id="opt-15" onclick="setSetPoints(15)">15</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-group-label">Theme</div>
        <div class="setting-opts">
          <button class="setting-opt" id="opt-colour" onclick="setColour(true)">Colour</button>
          <button class="setting-opt" id="opt-mono" onclick="setColour(false)">Mono</button>
        </div>
      </div>

      <button id="install-btn" class="setting-install" onclick="installPWA()">Add to home screen</button>

      <button class="overlay-btn" onclick="closeSettings()">Done</button>
    </div>
  </div>

  <!-- Install tip -->
  <div id="install-tip" class="overlay hidden" onclick="document.getElementById('install-tip').classList.add('hidden')">
    <div class="overlay-card">
      <div class="overlay-eyebrow">Add to home screen</div>
      <div id="install-tip-body" class="overlay-headline" style="font-size:18px;line-height:1.4;letter-spacing:.01em"></div>
      <button class="overlay-btn" onclick="document.getElementById('install-tip').classList.add('hidden')">Got it</button>
    </div>
  </div>

  <!-- Set won overlay -->
  <div id="set-overlay" class="overlay hidden" onclick="nextSet()">
    <div class="overlay-card">
      <div class="overlay-eyebrow" id="set-eyebrow"></div>
      <div class="overlay-headline" id="set-headline"></div>
      <div class="overlay-score" id="set-score-disp"></div>
      <button class="overlay-btn" onclick="nextSet()">Next set →</button>
    </div>
  </div>

  <!-- Match won overlay -->
  <div id="match-overlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-eyebrow">Match over</div>
      <div class="overlay-headline" id="match-headline"></div>
      <div class="overlay-score" id="match-score-disp"></div>
      <button class="overlay-btn" onclick="confirmNewMatch()">New match</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
